services:
  finance-api:
    # Pull the published image from GHCR (default):
    image: ghcr.io/sfiorini/pi-stef/finance-api:latest
    # To build from local source instead, comment out `image:` above and run:
    #   docker compose up --build
    # build:
    #   context: ../..
    #   dockerfile: packages/finance-api/docker/Dockerfile
    ports:
      - "127.0.0.1:7780:7780"  # Localhost only for security
    volumes:
      - finance-data:/data
      - finance-config:/root/.pi/sf/finance
    environment:
      - SF_FINANCE_DB=/data/finance.db
      - SF_FINANCE_HOST=0.0.0.0
      - SF_FINANCE_PORT=7780
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7780/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  finance-data:
  finance-config:
